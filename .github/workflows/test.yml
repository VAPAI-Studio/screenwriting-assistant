name: Test

# Test gate: runs the backend suite on every push and PR. A real failure
# fails the run; the 4 documented pre-existing suite-isolation flakes are
# absorbed by pytest-rerunfailures (a genuine failure still fails all reruns).
on:
  push:
  pull_request:

jobs:
  backend-tests:
    name: Backend test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # Tests use an in-memory SQLite engine (see conftest.py) — no external
        # Postgres needed. --reruns 2 tolerates the known flakes; --reruns-delay
        # spaces retries; a real regression fails on every attempt.
        env:
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret-not-used-in-prod
        run: pytest -q --reruns 2 --reruns-delay 1
