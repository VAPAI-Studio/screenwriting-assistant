name: Deploy

# Deploy to production on merge to main. Backend → Railway, frontend → Vercel.
# Both deploy jobs require the test gate to pass first. All credentials come
# from GitHub repo secrets — none are committed.
on:
  push:
    branches: [main]

jobs:
  # Re-run the test gate as a hard prerequisite for deploying.
  test:
    name: Test gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret-not-used-in-prod
        run: pytest -q --reruns 2 --reruns-delay 1

  deploy-backend:
    name: Deploy backend to Railway
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        # RAILWAY_TOKEN is a project token (Settings → Tokens) stored as a repo
        # secret. --service targets the backend service by name.
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_NAME }}" --ci

  deploy-frontend:
    name: Deploy frontend to Vercel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel (build in Vercel cloud)
        # Run from the REPO ROOT (not frontend/). The Vercel project's Root
        # Directory is already 'frontend', so Vercel installs deps + runs the Vite
        # build itself in its own environment (devDeps incl. vite available). Doing
        # a local --prebuilt build here double-applied the root dir and lost vite
        # ('vite: not found', exit 127), so let Vercel own the build.
        # VERCEL_TOKEN / ORG_ID / PROJECT_ID are repo secrets.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

  smoke-test:
    name: Post-deploy smoke test
    # Runs only after BOTH deploys succeed — this is the deploy success gate
    # (DVER-01): a deploy is not "successful" until prod is proven live.
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test (backend /health + frontend loads)
        env:
          BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
        run: bash scripts/smoke_test.sh
